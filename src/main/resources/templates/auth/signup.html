<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign Up</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #43e97b, #38f9d7);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #43e97b;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #32c965;
        }

        .login {
            margin-top: 20px;
        }

        .login a {
            text-decoration: none;
            color: #43e97b;
            font-weight: bold;
        }

        .login a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <form th:action="@{/register}" th:object="${user}" method="post">

        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

        <input type="text" th:field="*{username}" placeholder="Username" required>

        <input type="password" th:field="*{password}" placeholder="Password" required>

        <button type="submit">Sign Up</button>
    </form>

    <div class="login">
        Already have an account?
        <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
