<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Project</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="container">

    <!-- PROJECT NAME HEADER -->
    <h1 th:text="${project.name}">Project Name</h1>

    <hr>

    <!-- EDIT FORM -->
    <h2>Edit Project</h2>

    <form th:action="@{/projects/update}" method="post" th:object="${project}">

        <!-- hidden ID -->
        <input type="hidden" th:field="*{id}"/>

        <!-- project name -->
        <label>Project Name</label>
        <input type="text" th:field="*{name}" required/>

        <button type="submit">Save Changes</button>

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

    </form>

    <hr>

    <!-- ADD USE CASE BUTTON -->
    <h2>Use Cases</h2>

    <a th:href="@{'/projects/' + ${project.id} + '/usecase/create'}">
        <button type="button">
            + Add Use Case
        </button>
    </a>

</div>

</body>
</html>
