<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Project Overview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        .split-container {
            display: flex;
            gap: 30px;
            padding: 20px;
        }

        .column {
            flex: 1;
        }

        .column h2 {
            margin-top: 0;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .card-actions {
            margin-top: 10px;
        }

        button {
            padding: 6px 10px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
        }

        .add-btn {
            margin-bottom: 15px;
        }
    </style>
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/bar :: navbar}"></div>

<div class="container">

    <h1 th:text="${project.name}">Project Name</h1>
    <hr>

    <div class="split-container">

        <!-- ================= LEFT SIDE: USE CASES ================= -->
        <div class="column">

            <h2>Use Cases</h2>

            <div class="add-btn">
                <a th:href="@{'/projects/' + ${project.id} + '/usecase/create'}">
                    <button type="button">+ Add Use Case</button>
                </a>
            </div>

            <div th:if="${useCases == null or #lists.isEmpty(useCases)}">
                <p>No use cases yet...</p>
            </div>

            <div th:each="uc : ${useCases}" class="card">

                <h3 th:text="${uc.name}">Use Case Name</h3>

                <p><strong>Actors:</strong> <span th:text="${uc.actors}"></span></p>
                <p><strong>Preconditions:</strong> <span th:text="${uc.preconditions}"></span></p>
                <p><strong>Main Flow:</strong> <span th:text="${uc.mainFlow}"></span></p>
                <p><strong>Postconditions:</strong> <span th:text="${uc.postconditions}"></span></p>

                <div class="card-actions">
                    <a th:href="@{'/project/' + ${project.id} + '/usecases/edit/' + ${uc.id}}">
                        <button>Edit</button>
                    </a>

                    <a th:href="@{'/projects/' + ${project.id} + '/usecases/' + ${uc.id} + '/links'}">
                        <button>View Linked CRC Cards</button>
                    </a>

                    <form th:action="@{'/project/' + ${project.id} + '/usecases/delete/' + ${uc.id}}"
                          method="post"
                          style="display:inline;">

                        <button type="submit"
                                onclick="return confirm('Delete this use case?')">
                            Delete
                        </button>

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />
                    </form>
                </div>

            </div>

        </div>

        <!-- ================= RIGHT SIDE: CRC CARDS ================= -->
        <div class="column">

            <h2>CRC Cards</h2>

            <div class="add-btn">
                <a th:href="@{'/projects/' + ${project.id} + '/crc/create'}">
                    <button type="button">+ Add CRC Card</button>
                </a>
            </div>

            <div th:if="${crcCards == null or #lists.isEmpty(crcCards)}">
                <p>No CRC cards yet...</p>
            </div>

            <div th:each="crc : ${crcCards}" class="card">

                <h3 th:text="${crc.className}">Class Name</h3>

                <p>
                    <strong>Responsibilities:</strong>
                    <span th:text="${crc.responsibilities}"></span>
                </p>

                <p>
                    <strong>Collaborations:</strong>
                    <span th:text="${crc.collaborations}"></span>
                </p>

                <div class="card-actions">

                    <a th:href="@{'/projects/' + ${project.id} + '/crc/edit/' + ${crc.id}}">
                        <button>Edit</button>
                    </a>

                    <a th:href="@{'/projects/' + ${project.id} + '/crc/' + ${crc.id} + '/links'}">
                        <button>View Linked Use Cases</button>
                    </a>

                    <form th:action="@{'/projects/' + ${project.id} + '/crc/delete/' + ${crc.id}}"
                          method="post"
                          style="display:inline;">

                        <button type="submit"
                                onclick="return confirm('Delete this CRC card?')">
                            Delete
                        </button>

                        <input type="hidden"
                               th:name="${_csrf.parameterName}"
                               th:value="${_csrf.token}" />
                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
