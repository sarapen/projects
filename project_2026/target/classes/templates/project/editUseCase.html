<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit Use Case</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/bar :: navbar}"></div>

<div class="container">

    <h1>Edit Use Case</h1>

    <hr>

    <!-- FORM -->
    <form th:action="@{'/projects/' + ${projectId} + '/usecases/edit/' + ${useCase.id}}"
          th:object="${useCase}"
          method="post">

        <!-- NAME -->
        <label>Use Case Name</label>
        <input type="text" th:field="*{name}" required>
        <br><br>

        <!-- ACTORS -->
        <label>Actors</label>
        <textarea th:field="*{actors}" rows="3" required></textarea>
        <br><br>

        <!-- PRECONDITIONS -->
        <label>Preconditions</label>
        <textarea th:field="*{preconditions}" rows="3" required></textarea>
        <br><br>

        <!-- MAIN FLOW -->
        <label>Main Flow</label>
        <textarea th:field="*{mainFlow}" rows="6" required></textarea>
        <br><br>

        <!-- POSTCONDITIONS -->
        <label>Postconditions</label>
        <textarea th:field="*{postconditions}" rows="3" required></textarea>
        <br><br>

        <!-- UPDATE BUTTON -->
        <button type="submit">
            Update Use Case
        </button>

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

    </form>

</div>

</body>
</html>
