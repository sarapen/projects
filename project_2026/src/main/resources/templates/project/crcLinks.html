<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Linked Use Cases</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 700px;
            margin: 30px auto;
        }

        .item {
            background: #f4f4f4;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;

            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 6px 12px;
            background-color: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
        }

        .btn:hover {
            background-color: #1e7e34;
        }

        .empty {
            margin-top: 10px;
            color: #666;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<div th:replace="~{fragments/bar :: navbar}"></div>

<div class="container">

    <h2>
        Linked Use Cases
    </h2>

    <h3>
        Class name: <span th:text="${crc.className}">Class Name</span>
    </h3>

    <!-- Empty state -->
    <p class="empty" th:if="${#lists.isEmpty(linkedUseCases)}">
        No use cases linked yet.
    </p>

    <!-- List -->
    <div th:each="useCase : ${linkedUseCases}" class="item">

        <!-- Name -->
        <span th:text="${useCase.name}">Use Case Name</span>

        <!-- Edit button -->
        <a class="btn"
           th:href="@{'/usecase/' + ${useCase.id} + '/edit'}">
            Edit
        </a>

    </div>

</div>

</body>
</html>
