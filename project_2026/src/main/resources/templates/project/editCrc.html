<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Edit CRC Card</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div th:replace="~{fragments/bar :: navbar}"></div>

<div class="container">

    <h1>Edit CRC Card</h1>

    <hr>

    <!-- FORM -->
    <form th:action="@{'/projects/' + ${projectId} + '/crc/update/' + ${crc.id}}"
          th:object="${crc}"
          method="post">

        <!-- CLASS NAME -->
        <label>Class Name</label>
        <input type="text" th:field="*{className}" required>
        <br><br>

        <!-- RESPONSIBILITIES -->
        <label>Responsibilities</label>
        <textarea th:field="*{responsibilities}" rows="3" required></textarea>
        <br><br>

        <!-- COLLABORATIONS -->
        <label>Collaborations</label>
        <textarea th:field="*{collaborations}" rows="3" required></textarea>
        <br><br>

        <!-- UPDATE BUTTON -->
        <button type="submit">
            Update CRC Card
        </button>

        <!-- NEW LINK BUTTON -->
        <button type="button"
                th:onclick="'window.location.href=\'/projects/' + ${projectId} + '/crc/' + ${crc.id} + '/link-usecases\''">
            Link CRC with Use Case
        </button>

        <!-- CSRF -->
        <input type="hidden"
               th:name="${_csrf.parameterName}"
               th:value="${_csrf.token}" />

    </form>

</div>

</body>
</html>
