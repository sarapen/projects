<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>CRC Cards</title>

    <style>
        body {
            font-family: Arial, sans-serif;
        }

        .container {
            max-width: 900px;
            margin: 30px auto;
        }

        .title {
            margin-bottom: 20px;
        }

        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .card {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 8px;
            border-left: 5px solid #007bff;
        }

        .card h3 {
            margin: 0 0 10px 0;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 6px 10px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 13px;
        }

        .btn:hover {
            background: #1e7e34;
        }

        .empty {
            color: #666;
        }
    </style>
</head>

<body>

<div th:replace="~{fragments/bar :: navbar}"></div>

<div class="container">

    <!-- Use Case Title -->
    <h2 class="title">
        CRC Cards for Use Case:
        <span th:text="${useCase.name}">Use Case Name</span>
    </h2>

    <!-- Empty state -->
    <p class="empty" th:if="${#lists.isEmpty(crcCards)}">
        No CRC cards linked to this use case.
    </p>

    <!-- CRC Cards List -->
    <div class="cards">

        <div class="card" th:each="crc : ${crcCards}">

            <h3 th:text="${crc.className}">Class Name</h3>

            <p>
                <strong>ID:</strong>
                <span th:text="${crc.id}">1</span>
            </p>

            <!-- Optional link -->
            <a class="btn"
               th:href="@{'/crc/' + ${crc.id}}">
                View CRC
            </a>

        </div>

    </div>

</div>

</body>
</html>
