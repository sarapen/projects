<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Project Use Cases</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<!-- NAVBAR -->
<div th:replace="~{fragments/bar :: navbar}"></div>

<div class="container">

    <!-- PROJECT TITLE -->
    <h1 th:text="${project.name}">Project Name</h1>

    <hr>

    <!-- ADD USE CASE BUTTON (ALWAYS VISIBLE) -->
    <div style="margin-bottom: 20px;">
        <a th:href="@{'/projects/' + ${project.id} + '/usecase/create'}">
            <button type="button">+ Add Use Case</button>
        </a>
    </div>

    <!-- EMPTY STATE -->
    <div th:if="${useCases == null or #lists.isEmpty(useCases)}">
        <p>No use cases yet... </p>
    </div>

    <!-- USE CASE LIST -->
    <div th:if="${useCases != null and !#lists.isEmpty(useCases)}">

        <div th:each="uc : ${useCases}" class="usecase-card">

            <!-- TITLE -->
            <h3 th:text="${uc.name}">Use Case Name</h3>

            <!-- CONTENT -->
            <p><strong>Actors:</strong>
                <span th:text="${uc.actors}"></span>
            </p>

            <p><strong>Preconditions:</strong>
                <span th:text="${uc.preconditions}"></span>
            </p>

            <p><strong>Main Flow:</strong>
                <span th:text="${uc.mainFlow}"></span>
            </p>

            <p><strong>Postconditions:</strong>
                <span th:text="${uc.postconditions}"></span>
            </p>

            <!-- ACTION BUTTONS -->
            <div class="usecase-actions">

                <!-- EDIT -->
                <a th:href="@{'/usecases/edit/' + ${uc.id}}">
                    <button type="button">Edit</button>
                </a>

                <!-- DELETE -->
                <form th:action="@{'/project/' + ${project.id} + '/usecases/delete/' + ${uc.id}}"
                      method="post"
                      style="display:inline;">

                    <button type="submit"
                            onclick="return confirm('Delete this use case?')">
                        Delete
                    </button>

                    <!-- CSRF -->
                    <input type="hidden"
                           th:name="${_csrf.parameterName}"
                           th:value="${_csrf.token}" />
                </form>

            </div>

            <hr>

        </div>

    </div>

</div>

</body>
</html>
