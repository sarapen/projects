<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: #4facfe;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        button:hover {
            background: #3a8de0;
        }

        .signup {
            margin-top: 20px;
        }

        .signup a {
            text-decoration: none;
            color: #4facfe;
            font-weight: bold;
        }

        .signup a:hover {
            text-decoration: underline;
        }

        .error {
            color: red;
            margin-top: 10px;
        }

        .logout {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Login</h2>

    <!-- Spring Security login form -->
    <form method="post" th:action="@{/login}">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Sign In</button>
    </form>

    <!-- Optional messages -->
    <div th:if="${param.error}" class="error">
        Invalid username or password
    </div>

    <div th:if="${param.logout}" class="logout">
        You have been logged out
    </div>

    <!-- Signup section -->
    <div class="signup">
        Don't have an account?
        <a href="/signup">Create one</a>
    </div>
</div>

</body>
</html>
